{% extends "base.html" %}
{% block title %}File Too Large{% endblock %}
{% block page_title %}<i class="bi bi-file-earmark-x me-2 text-danger"></i>File Too Large{% endblock %}
{% block content %}
<div class="row justify-content-center mt-5">
  <div class="col-12 col-md-6 text-center">
    <div class="display-1 fw-bold text-muted mb-3">413</div>
    <h3 class="mb-2">File Too Large</h3>
    <p class="text-muted mb-4">The uploaded file exceeds the maximum allowed size of <strong>16 MB</strong>. Please reduce the file size and try again.</p>
    <a href="{{ url_for('main.upload') }}" class="btn btn-primary">
      <i class="bi bi-cloud-upload me-1"></i>Try Again
    </a>
  </div>
</div>
{% endblock %}
