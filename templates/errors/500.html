{% extends "base.html" %}
{% block title %}Server Error{% endblock %}
{% block page_title %}<i class="bi bi-exclamation-octagon me-2 text-danger"></i>Server Error{% endblock %}
{% block content %}
<div class="row justify-content-center mt-5">
  <div class="col-12 col-md-6 text-center">
    <div class="display-1 fw-bold text-muted mb-3">500</div>
    <h3 class="mb-2">Something Went Wrong</h3>
    <p class="text-muted mb-4">An unexpected error occurred. The issue has been logged. Please try again in a moment.</p>
    <div class="d-flex gap-2 justify-content-center">
      <a href="{{ url_for('main.dashboard') }}" class="btn btn-primary">
        <i class="bi bi-house-fill me-1"></i>Dashboard
      </a>
      <button onclick="history.back()" class="btn btn-outline-secondary">
        <i class="bi bi-arrow-left me-1"></i>Go Back
      </button>
    </div>
  </div>
</div>
{% endblock %}
