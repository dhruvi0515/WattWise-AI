{% extends "base.html" %}
{% block title %}Bad Request{% endblock %}
{% block page_title %}<i class="bi bi-exclamation-triangle me-2 text-warning"></i>Bad Request{% endblock %}
{% block content %}
<div class="row justify-content-center mt-5">
  <div class="col-12 col-md-6 text-center">
    <div class="display-1 fw-bold text-muted mb-3">400</div>
    <h3 class="mb-2">Bad Request</h3>
    <p class="text-muted mb-4">The server could not understand the request. Please check your input and try again.</p>
    <a href="{{ url_for('main.dashboard') }}" class="btn btn-primary">
      <i class="bi bi-house-fill me-1"></i>Return to Dashboard
    </a>
  </div>
</div>
{% endblock %}
